name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync frontend → docs
        run: |
          rm -rf docs
          cp -r frontend docs

      - name: Commit and push docs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet \
            && echo "Nothing changed in docs, skipping commit." \
            || (git commit -m "chore: sync docs from frontend [skip ci]" && git push)
