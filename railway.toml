# Root-level Railway config — used when Root Directory in the Railway dashboard
# is left at the repo root (not set to "backend/").
#
# Preferred setup: set Root Directory = "backend" in Railway dashboard.
# In that case, Railway uses backend/railway.toml + backend/Dockerfile instead.

[build]
builder      = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand        = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath     = "/"
healthcheckTimeout  = 300
restartPolicyType   = "ON_FAILURE"
restartPolicyMaxRetries = 3
