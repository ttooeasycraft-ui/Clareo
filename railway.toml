# Root-level Railway config — used when Root Directory in the Railway dashboard
# is left at the repo root (not set to "backend/").
#
# startCommand intentionally removed — Dockerfile CMD handles port binding.
# CMD uses shell form: uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}
# Railway's startCommand overrides CMD in exec form (no $PORT expansion) → crash.

[build]
builder        = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath         = "/"
healthcheckTimeout      = 300
restartPolicyType       = "ON_FAILURE"
restartPolicyMaxRetries = 3
