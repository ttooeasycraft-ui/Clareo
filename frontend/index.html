<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClipAI — Gerador de Clipes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-glow"></div>

  <div class="container">
    <!-- Header -->
    <header>
      <div class="logo">
        <span class="logo-icon">✂️</span>
        <span class="logo-text">Clip<span class="accent">AI</span></span>
      </div>
      <p class="tagline">Cole o link, pegue os melhores momentos em 9:16 com legenda.</p>
    </header>

    <!-- Main form card -->
    <div class="card" id="card-form">
      <div class="form-group">
        <label for="video-url">Link do vídeo</label>
        <div class="input-row">
          <input
            type="url"
            id="video-url"
            placeholder="https://youtube.com/watch?v=... ou TikTok, Instagram..."
            autocomplete="off"
          />
          <button id="btn-process" onclick="startProcess()">
            <span id="btn-text">Gerar Clipes</span>
          </button>
        </div>
      </div>

      <!-- Advanced options (collapsible) -->
      <details class="advanced">
        <summary>Opções avançadas</summary>
        <div class="advanced-grid">
          <div class="form-group">
            <label for="keywords">Palavras-chave extras (separadas por vírgula)</label>
            <input type="text" id="keywords" placeholder="ex: incrível, que loucura, não acredito" />
          </div>
          <div class="form-group">
            <label for="min-duration">Duração mínima do clipe (segundos)</label>
            <input type="number" id="min-duration" value="20" min="5" max="120" />
          </div>
          <div class="form-group">
            <label for="max-duration">Duração máxima do clipe (segundos)</label>
            <input type="number" id="max-duration" value="60" min="10" max="180" />
          </div>
          <div class="form-group">
            <label for="max-clips">Máx. de clipes</label>
            <input type="number" id="max-clips" value="5" min="1" max="10" />
          </div>
        </div>
      </details>
    </div>

    <!-- Progress card -->
    <div class="card card-progress" id="card-progress" style="display:none">
      <div class="progress-header">
        <span class="spinner"></span>
        <span id="progress-msg">Processando...</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
      </div>
      <p class="progress-pct" id="progress-pct">0%</p>
      <button class="btn-secondary" onclick="cancelProcess()">Cancelar</button>
    </div>

    <!-- Results card -->
    <div class="card card-results" id="card-results" style="display:none">
      <div class="results-header">
        <span class="check-icon">✅</span>
        <h2 id="results-title">Clipes prontos!</h2>
      </div>
      <div id="clips-grid" class="clips-grid"></div>
      <button class="btn-secondary" onclick="reset()">Processar outro vídeo</button>
    </div>

    <!-- Error card -->
    <div class="card card-error" id="card-error" style="display:none">
      <div class="error-icon">⚠️</div>
      <h2>Algo deu errado</h2>
      <p id="error-msg">Erro desconhecido</p>
      <button onclick="reset()">Tentar novamente</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
